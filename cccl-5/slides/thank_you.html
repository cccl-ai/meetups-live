<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Georgia&family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; background: linear-gradient(135deg, #1a1a2e 0%, #16162b 50%, #1e1e38 100%); position: relative; overflow: hidden; font-family: 'Inter', sans-serif; }
  .slide::before { content: ''; position: absolute; top: -50%; right: -20%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(196,130,95,0.06) 0%, transparent 70%); border-radius: 50%; }
  .slide::after { content: ''; position: absolute; bottom: -30%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(168,164,160,0.04) 0%, transparent 70%); border-radius: 50%; }
  .content { position: relative; z-index: 1; padding: 50px 80px; height: 100%; display: flex; flex-direction: column; align-items: center; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
  .event-tag { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #a8a4a0; }
  .event-tag span { color: #c4825f; }
  .title { font-family: Georgia, 'Times New Roman', serif; font-size: 48px; font-weight: 700; color: #e8e4dd; margin-bottom: 8px; }
  .subtitle { font-size: 18px; color: #a8a4a0; margin-bottom: 40px; }
  .qr-row { display: flex; gap: 50px; align-items: flex-start; }
  .qr-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .qr-box { width: 160px; height: 160px; background: rgba(255,255,255,0.05); border: 1px solid rgba(196,130,95,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 14px; }
  .qr-box img { width: 100%; height: 100%; }
  .qr-label { font-size: 15px; font-weight: 600; color: #c4825f; }
  .qr-url { font-size: 11px; color: #a8a4a0; }
  .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; }
  .cccl-logo { height: 56px; opacity: 0.85; }
  .url { font-size: 13px; color: #a8a4a0; }
</style>
</head>
<body>
<div class="slide">
  <div class="content">
    <div class="top-bar">
      <div class="event-tag"><span>CCCL #5</span> — Claude Code for Everyone</div>
      <div class="event-tag">7 April 2026</div>
    </div>
    <div class="title">Thank You!</div>
    <div class="subtitle">Stay connected with the community</div>
    <div class="qr-row">
      <div class="qr-item">
        <div class="qr-box">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://cccl.ai/whatsapp&bgcolor=1A1A2E&color=E8E4DD&format=svg" alt="QR" />
        </div>
        <div class="qr-label">WhatsApp</div>
        <div class="qr-url">cccl.ai/whatsapp</div>
      </div>
      <div class="qr-item">
        <div class="qr-box">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://cccl.ai/slack&bgcolor=1A1A2E&color=E8E4DD&format=svg" alt="QR" />
        </div>
        <div class="qr-label">Slack</div>
        <div class="qr-url">cccl.ai/slack</div>
      </div>
      <div class="qr-item">
        <div class="qr-box">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://cccl.ai/luma&bgcolor=1A1A2E&color=E8E4DD&format=svg" alt="QR" />
        </div>
        <div class="qr-label">Luma</div>
        <div class="qr-url">cccl.ai/luma</div>
      </div>
      <div class="qr-item">
        <div class="qr-box">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://cccl.ai&bgcolor=1A1A2E&color=E8E4DD&format=svg" alt="QR" />
        </div>
        <div class="qr-label">Website</div>
        <div class="qr-url">cccl.ai</div>
      </div>
    </div>
    <div class="bottom-bar">
      <img class="cccl-logo" src="https://cccl.ai/logos/cccl-badge-dark.svg" alt="CCCL" />
      <div class="url">cccl.ai</div>
    </div>
  </div>
</div>
</body>
</html>
