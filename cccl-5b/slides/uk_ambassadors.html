<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Georgia&family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide { width: 1280px; height: 720px; background: linear-gradient(135deg, #1a1a2e 0%, #16162b 50%, #1e1e38 100%); position: relative; overflow: hidden; font-family: 'Inter', sans-serif; }
  .slide::before { content: ''; position: absolute; top: -50%; right: -20%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(196,130,95,0.06) 0%, transparent 70%); border-radius: 50%; }
  .slide::after { content: ''; position: absolute; bottom: -30%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(168,164,160,0.04) 0%, transparent 70%); border-radius: 50%; }
  .content { position: relative; z-index: 1; padding: 50px 80px; height: 100%; display: flex; flex-direction: column; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .event-tag { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #a8a4a0; }
  .event-tag span { color: #c4825f; }
  .title { font-family: Georgia, 'Times New Roman', serif; font-size: 36px; font-weight: 700; color: #e8e4dd; text-align: center; margin-bottom: 8px; }
  .subtitle { font-size: 16px; font-weight: 400; color: #a8a4a0; text-align: center; margin-bottom: 36px; }
  .ambassadors { display: flex; justify-content: center; gap: 60px; flex: 1; align-items: center; }
  .ambassador { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .photo { width: 240px; height: 240px; border-radius: 50%; object-fit: cover; object-position: center 30%; border: 3px solid rgba(196,130,95,0.3); }
  .name { font-family: Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 700; color: #e8e4dd; text-align: center; }
  .role { font-size: 13px; font-weight: 500; color: #c4825f; text-align: center; letter-spacing: 0.5px; }
  .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
  .cccl-logo { height: 56px; opacity: 0.85; }
  .url { font-size: 13px; color: #a8a4a0; }
</style>
</head>
<body>
<div class="slide">
  <div class="content">
    <div class="top-bar">
      <div class="event-tag"><span>CCCL #5B</span> — Claude Code for Agentic Engineering</div>
      <div class="event-tag">8 April 2026</div>
    </div>
    <div class="title">Claude Community Ambassadors — UK</div>
    <div class="subtitle">Official Anthropic</div>
    <div class="ambassadors">
      <div class="ambassador">
        <img class="photo" src="vikram_ambassador.jpg" alt="Vikram Pawar" />
        <div class="name">Vikram Pawar</div>
        <div class="role">London</div>
      </div>
      <div class="ambassador">
        <img class="photo" src="olivier_negris.jpeg" alt="Olivier Negris" />
        <div class="name">Olivier Negris</div>
        <div class="role">London</div>
      </div>
      <div class="ambassador">
        <img class="photo" style="object-position: center center;" src="max_tatton_brown.jpeg" alt="Max Tatton-Brown" />
        <div class="name">Max Tatton-Brown</div>
        <div class="role">London</div>
      </div>
    </div>
    <div class="bottom-bar">
      <img class="cccl-logo" src="https://cccl.ai/logos/cccl-badge-dark.svg" alt="CCCL" />
      <div class="url">cccl.ai</div>
    </div>
  </div>
</div>
</body>
</html>
